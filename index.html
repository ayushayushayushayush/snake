<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Snake & Ladders</title>
    <style>
        :root {
            --bg-color: #121212;
            --board-size: 95vw;
            --cell-color: #1e1e1e;
            --accent: #ff4757;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        #game-container {
            width: var(--board-size);
            max-width: 428px; /* iPhone 13 Pro Max width */
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        #board {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            grid-template-rows: repeat(10, 1fr);
            width: var(--board-size);
            height: var(--board-size);
            max-width: 428px;
            max-height: 428px;
            border: 2px solid #444;
            position: relative;
        }

        .cell {
            border: 0.5px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            position: relative;
            background-color: var(--cell-color);
        }

        .cell:nth-child(even) {
            background-color: #252525;
        }

        #player {
            width: 60%;
            height: 60%;
            background-color: var(--accent);
            border-radius: 50%;
            position: absolute;
            transition: all 0.3s ease-in-out;
            z-index: 10;
            box-shadow: 0 0 10px rgba(255, 71, 87, 0.8);
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: #222;
            border-radius: 15px;
        }

        button {
            background: var(--accent);
            border: none;
            color: white;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            active: transform: scale(0.95);
        }

        #status {
            font-size: 1.2rem;
            text-align: center;
        }

        /* Snakes and Ladders simple visual markers */
        .snake { color: #2ed573; font-weight: bold; }
        .ladder { color: #eccc68; font-weight: bold; }

    </style>
</head>
<body>

    <div id="game-container">
        <div id="status">Roll to start!</div>
        
        <div id="board">
            <div id="player"></div>
        </div>

        <div class="controls">
            <div id="dice-result">🎲: -</div>
            <button onclick="rollDice()">Roll Dice</button>
        </div>
    </div>

    <script>
        const board = document.getElementById('board');
        const playerMarker = document.getElementById('player');
        const statusText = document.getElementById('status');
        const diceText = document.getElementById('dice-result');

        let playerPos = 1;
        const cells = [];

        // Define Snakes and Ladders {start: end}
        const shortcuts = {
            4: 14, 9: 31, 17: 7, 20: 38, 28: 84, 40: 59, 
            51: 67, 54: 34, 62: 19, 63: 81, 71: 91, 87: 24, 93: 73, 95: 75, 99: 78
        };

        function createBoard() {
            // Create cells 100 to 1 for Boustrophedon (snake-like) layout
            for (let i = 100; i >= 1; i--) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.id = `cell-${i}`;
                cell.innerText = i;
                
                if (shortcuts[i]) {
                    if (shortcuts[i] > i) cell.classList.add('ladder');
                    else cell.classList.add('snake');
                }

                board.appendChild(cell);
                cells[i] = cell;
            }
            updatePlayerUI();
        }

        function updatePlayerUI() {
            const currentCell = document.getElementById(`cell-${playerPos}`);
            currentCell.appendChild(playerMarker);
        }

        function rollDice() {
            const roll = Math.floor(Math.random() * 6) + 1;
            diceText.innerText = `🎲: ${roll}`;
            
            movePlayer(roll);
        }

        function movePlayer(steps) {
            if (playerPos + steps <= 100) {
                playerPos += steps;
            }

            // Check for snakes or ladders
            if (shortcuts[playerPos]) {
                const destination = shortcuts[playerPos];
                const type = destination > playerPos ? "Ladder! 🪜" : "Snake! 🐍";
                statusText.innerText = type;
                playerPos = destination;
            } else {
                statusText.innerText = `Moved to ${playerPos}`;
            }

            updatePlayerUI();

            if (playerPos === 100) {
                statusText.innerText = "🎉 YOU WIN!";
                setTimeout(() => { playerPos = 1; updatePlayerUI(); }, 3000);
            }
        }

        createBoard();
    </script>
</body>
</html>
